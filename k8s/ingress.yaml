apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # forward /api/* to backend, strip /api prefix
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # backend — must come before frontend catch-all
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-service
                port:
                  number: 3000
          # frontend — catches everything else
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
```

---

Here's how all the pieces connect:
```
Request: GET /
  → Ingress → frontend-service → frontend pod (nginx)

Request: POST /api/login
  → Ingress → backend-service → backend pod (node.js)
                                      │
                                      ▼
                               mysql-service
                                      │
                                      ▼
                               mysql pod + PVC
                               (data persists on disk)
